<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 BDT Exchange Rates</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🌍 BDT Exchange Rates</h1>
    
    <div class="controls">
      <input type="number" id="amount" value="100" placeholder="Enter BDT Amount">
      <input type="text" id="search" placeholder="Search by country or currency code...">
    </div>

    <table id="rateTable">
      <thead>
        <tr>
          <th>Country</th>
          <th>Currency Code</th>
          <th>Rate (for 100 BDT)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <p id="lastUpdated"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
