<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Rates</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🌍 Exchange Rates</h1>

<input type="number" id="amount" value="100" placeholder="Enter BDT Amount">

<input type="text" id="search" placeholder="Search Country or Currency Code">

<table id="rateTable">
<thead>
<tr>
<th>Country</th>
<th>Code</th>
<th>Rate</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
