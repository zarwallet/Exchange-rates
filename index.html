<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZAR Wallet Exchange Rate</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
    .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 20px; }
    .logo { width: 110px; height: 110px; border-radius: 15px; }
    h1 { margin: 10px 0; color: #2c3e50; }
    input { padding: 12px; margin: 8px 5px; font-size: 16px; width: 100%; max-width: 320px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #3498db; color: white; }
    tr:hover { background: #f8f9fa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="IMG_20260718_091823.jpg" alt="ZAR Wallet Logo" class="logo">
      <h1>ZAR Wallet Exchange Rate</h1>
    </div>
    
    <input type="number" id="amount" value="1" placeholder="Enter ZAR $ Amount">
    <input type="text" id="search" placeholder="Search by country or currency...">

    <table>
      <thead>
        <tr>
          <th>Country</th>
          <th>Currency Code</th>
          <th>Rate</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <p id="lastUpdated" style="text-align:center; margin-top:15px; color:#555;"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
